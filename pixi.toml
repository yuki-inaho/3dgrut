[workspace]
channels = ["conda-forge"]
name = "3dgrut"
platforms = [{ platform = "linux-64", cuda = "12" }]
version = "2.0.0"

[dependencies]
python = "3.11.*"
pip = ">=25"
setuptools = "==78.1.1"
pytorch-gpu = ">=2.10,<3"
torchvision = ">=0.26,<0.27"
cuda-version = "12.9.*"
cuda-nvcc = "12.9.*"
cuda-cudart-dev = ">=12.9,<13"
cuda-nvrtc-dev = "12.9.*"
libcublas-dev = ">=12.9,<13"
libcusparse-dev = ">=12.5,<13"
libcusolver-dev = ">=11.7,<12"
compilers = ">=1.11"
cmake = ">=3.28"
ninja = ">=1.12"
pkg-config = "*"
libgl-devel = "*"

[activation]
env = { CUDA_HOME = "$CONDA_PREFIX", TORCH_CUDA_ARCH_LIST = "8.9", TCNN_CUDA_ARCHITECTURES = "89", MAX_JOBS = "2", CC = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-cc", CXX = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-c++" }

[tasks]
check = "python -c \"import torch; assert torch.cuda.is_available(), 'CUDA is unavailable'; print(f'3DGRUT Pixi ready: torch={torch.__version__}, CUDA={torch.version.cuda}, GPU={torch.cuda.get_device_name(0)}')\""
install-project = "python -m pip install --no-build-isolation -e '.[dev,gui]'"
install-tcnn = "python -m pip install --no-cache-dir --no-build-isolation -r requirements_tinycudann.txt"
install-extra = "python -m pip install --no-cache-dir --no-build-isolation -r requirements_extra.txt"
